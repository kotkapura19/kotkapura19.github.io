<!DOCTYPE html>
<html lang="pa">
<head>
<meta charset="UTF-8">
<title>Simran Button</title>

<style>
#simranBtn{
  padding:10px 20px;
  font-size:18px;
  background-color:#ff9933;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<h2>ਸਤਿ ਸ਼੍ਰੀ ਅਕਾਲ ਜੀ 🙏</h2>

<audio id="simranAudio" loop>
  <source src="Waheguru Simran.mp3" type="audio/mpeg">
</audio>

<button id="simranBtn" onclick="toggleSimran()">Simran ON</button>

<script>
function toggleSimran() {
  var audio = document.getElementById("simranAudio");
  var btn = document.getElementById("simranBtn");

  if (audio.paused) {
    audio.play();
    btn.innerHTML = "Simran OFF";
  } else {
    audio.pause();
    btn.innerHTML = "Simran ON";
  }
}
</script>

</body>
</html>
