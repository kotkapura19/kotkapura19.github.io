<!DOCTYPE html>
<html lang="pa">
<head>
<meta charset="UTF-8">
<title>Contact Us - Gurbani Vichar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial, sans-serif;
line-height:1.9;
max-width:900px;
margin:auto;
padding:20px;
background-color:#e8f5e9;
}

h1{
color:#1b5e20;
}

h2{
color:#2e7d32;
margin-top:30px;
}

.contact-box{
background:#ffffff;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0f5132;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#198754;
}
</style>
</head>

<body>

<h1>Contact Us – ਸਾਡੇ ਨਾਲ ਸੰਪਰਕ ਕਰੋ</h1>

<p>
ਜੇ ਤੁਹਾਡੇ ਕੋਲ ਗੁਰਬਾਣੀ ਬਾਰੇ ਕੋਈ ਸਵਾਲ ਹੈ ਜਾਂ ਤੁਸੀਂ ਸਾਡੇ ਨਾਲ ਸੰਪਰਕ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ ਤਾਂ ਹੇਠਾਂ ਦਿੱਤੇ ਫਾਰਮ ਰਾਹੀਂ ਸਾਨੂੰ ਸੰਦੇਸ਼ ਭੇਜ ਸਕਦੇ ਹੋ।
</p>

<div class="contact-box">

<label>ਤੁਹਾਡਾ ਨਾਮ</label>
<input type="text" placeholder="ਆਪਣਾ ਨਾਮ ਲਿਖੋ">

<label>Email</label>
<input type="email" placeholder="ਆਪਣਾ Email ਲਿਖੋ">

<label>ਸੰਦੇਸ਼</label>
<textarea rows="5" placeholder="ਆਪਣਾ ਸੰਦੇਸ਼ ਲਿਖੋ"></textarea>

<button>Send Message</button>

</div>

<h2>🙏 ਵਾਹਿਗੁਰੂ ਜੀ ਕਾ ਖਾਲਸਾ, ਵਾਹਿਗੁਰੂ ਜੀ ਕੀ ਫਤਹਿ</h2>

</body>
</html>
