<h1>🌸 ਜਪੁਜੀ ਸਾਹਿਬ – ਭਾਗ 2</h1>
  
<p style="text-align:center;"><strong>ਪਉੜੀ ੨ ਤੋਂ ੫ ਦੀ ਵਿਆਖਿਆ</strong></p>
  <h2>🪔 ਪਉੜੀ ੨</h2>
<p>
ਹੁਕਮੀ ਹੋਵਨਿ ਆਕਾਰ ਹੁਕਮੁ ਨ ਕਹਿਆ ਜਾਈ ॥<br>
ਹੁਕਮੀ ਹੋਵਨਿ ਜੀਅ ਹੁਕਮਿ ਮਿਲੈ ਵਡਿਆਈ ॥<br>
ਹੁਕਮੀ ਉਤਮੁ ਨੀਚੁ ਹੁਕਮਿ ਲਿਖਿ ਦੁਖ ਸੁਖ ਪਾਈਅਹਿ ॥<br>
ਇਕਨਾ ਹੁਕਮੀ ਬਖਸੀਸ ਇਕਿ ਹੁਕਮੀ ਸਦਾ ਭਵਾਈਅਹਿ ॥<br>
ਹੁਕਮੈ ਅੰਦਰਿ ਸਭੁ ਕੋ ਬਾਹਰਿ ਹੁਕਮ ਨ ਕੋਇ ॥<br>
ਨਾਨਕ ਹੁਕਮੈ ਜੇ ਬੁਝੈ ਤ ਹਉਮੈ ਕਹੈ ਨ ਕੋਇ ॥੨॥
</p>
<h2>🪔 ਪਉੜੀ ੨ – ਵਿਆਖਿਆ</h2>
<p>
ਇਸ ਪਉੜੀ ਵਿੱਚ ਸ੍ਰਿਸ਼ਟੀ ਦੇ ਵਿਸ਼ਾਲ ਰੂਪ ਦੀ ਵਿਆਖਿਆ ਕੀਤੀ ਗਈ ਹੈ। ਅਣਗਿਣਤ ਪਾਤਾਲ, ਅਣਗਿਣਤ ਆਕਾਸ਼ ਅਤੇ ਅਣਗਿਣਤ ਜੀਵ ਹਨ।
ਇਨਸਾਨੀ ਅਕਲ ਸੀਮਤ ਹੈ, ਇਸ ਕਰਕੇ ਉਹ ਰੱਬ ਦੀ ਰਚਨਾ ਦੀ ਪੂਰੀ ਸਮਝ ਨਹੀਂ ਕਰ ਸਕਦਾ।
ਸਾਨੂੰ ਨਿਮਰਤਾ ਨਾਲ ਉਸਦੀ ਵਡਿਆਈ ਸਵੀਕਾਰ ਕਰਨੀ ਚਾਹੀਦੀ ਹੈ।
</p>
<h2>🪔 ਪਉੜੀ ੩</h2>
<p>
ਗਾਵੈ ਕੋ ਤਾਣੁ ਹੋਵੈ ਕਿਸੈ ਤਾਣੁ ॥<br>
ਗਾਵੈ ਕੋ ਦਾਤਿ ਜਾਣੈ ਨੀਸਾਣੁ ॥<br>
ਗਾਵੈ ਕੋ ਗੁਣ ਵਡਿਆਈਆ ਚਾਰ ॥<br>
ਗਾਵੈ ਕੋ ਵਿਦਿਆ ਵਿਖਮੁ ਵੀਚਾਰੁ ॥<br>
ਗਾਵੈ ਕੋ ਸਾਜਿ ਕਰੇ ਤਨੁ ਖੇਹ ॥<br>
ਗਾਵੈ ਕੋ ਜੀਅ ਲੈ ਫਿਰਿ ਦੇਹ ॥<br>
ਗਾਵੈ ਕੋ ਜਾਪੈ ਦਿਸੈ ਦੂਰਿ ॥<br>
ਗਾਵੈ ਕੋ ਵੇਖੈ ਹਾਦਰਾ ਹਦੂਰਿ ॥<br>
ਕਥਨਾ ਕਥੀ ਨ ਆਵੈ ਤੋਟਿ ॥<br>
ਕਥਿ ਕਥਿ ਕਥੀ ਕੋਟੀ ਕੋਟਿ ਕੋਟਿ ॥<br>
ਦੇਦਾ ਦੇ ਲੈਦੇ ਥਕਿ ਪਾਹਿ ॥<br>
ਜੁਗਾ ਜੁਗੰਤਰਿ ਖਾਹੀ ਖਾਹਿ ॥<br>
ਹੁਕਮੀ ਹੁਕਮੁ ਚਲਾਏ ਰਾਹੁ ॥<br>
ਨਾਨਕ ਵਿਗਸੈ ਵੇਪਰਵਾਹੁ ॥੩॥
</p>
<h2>🪔 ਪਉੜੀ ੩ – ਵਿਆਖਿਆ</h2>
<p>
ਇਸ ਪਉੜੀ ਵਿੱਚ ਦੱਸਿਆ ਗਿਆ ਹੈ ਕਿ ਕਈ ਲੋਕ ਰੱਬ ਦੀ ਵਡਿਆਈ ਕਰਦੇ ਹਨ — ਕੋਈ ਤਾਕਤ ਕਰਕੇ, ਕੋਈ ਦਾਤਾਂ ਕਰਕੇ, ਕੋਈ ਗਿਆਨ ਕਰਕੇ।
ਪਰ ਰੱਬ ਦੀ ਮਹਿਮਾ ਬੇਅੰਤ ਹੈ। ਮਨੁੱਖੀ ਬੋਲ ਉਸਦੀ ਪੂਰੀ ਵਡਿਆਈ ਨਹੀਂ ਕਰ ਸਕਦੇ।
</p>
<h2>🪔 ਪਉੜੀ ੪</h2>
<p>
ਸਾਚਾ ਸਾਹਿਬੁ ਸਾਚੁ ਨਾਇ ਭਾਖਿਆ ਭਾਉ ਅਪਾਰੁ ॥<br>
ਆਖਹਿ ਮੰਗਹਿ ਦੇਹਿ ਦੇਹਿ ਦਾਤਿ ਕਰੇ ਦਾਤਾਰੁ ॥<br>
ਫੇਰਿ ਕਿ ਅਗੈ ਰਖੀਐ ਜਿਤੁ ਦਿਸੈ ਦਰਬਾਰੁ ॥<br>
ਮੁਹੌ ਕਿ ਬੋਲਣੁ ਬੋਲੀਐ ਜਿਤੁ ਸੁਣਿ ਧਰੇ ਪਿਆਰੁ ॥<br>
ਅੰਮ੍ਰਿਤ ਵੇਲਾ ਸਚੁ ਨਾਉ ਵਡਿਆਈ ਵੀਚਾਰੁ ॥<br>
ਕਰਮੀ ਆਵੈ ਕਪੜਾ ਨਦਰੀ ਮੋਖੁ ਦੁਆਰੁ ॥<br>
ਨਾਨਕ ਏਵੈ ਜਾਣੀਐ ਸਭੁ ਆਪੇ ਸਚਿਆਰੁ ॥੪॥
</p>
<h2>🪔 ਪਉੜੀ ੪ – ਵਿਆਖਿਆ</h2>
<p>
ਇਥੇ ਗੁਰੂ ਸਾਹਿਬ ਦੱਸਦੇ ਹਨ ਕਿ ਰੱਬ ਦੀ ਦਾਤ ਬੇਅੰਤ ਹੈ। ਉਹ ਸਭ ਨੂੰ ਦੇਂਦਾ ਹੈ ਪਰ ਕੁਝ ਲੋਕ ਕਦੇ ਸ਼ੁਕਰ ਨਹੀਂ ਕਰਦੇ।
ਅਸਲੀ ਭਗਤ ਉਹ ਹੈ ਜੋ ਰੱਬ ਦੀ ਰਜ਼ਾ ਨੂੰ ਮੰਨਦਾ ਹੈ ਅਤੇ ਹਮੇਸ਼ਾ ਉਸਦਾ ਧੰਨਵਾਦ ਕਰਦਾ ਹੈ।
</p>
<h2>🪔 ਪਉੜੀ ੫</h2>
<p>
ਥਾਪਿਆ ਨ ਜਾਇ ਕੀਤਾ ਨ ਹੋਇ ॥<br>
ਆਪੇ ਆਪਿ ਨਿਰੰਜਨੁ ਸੋਇ ॥<br>
ਜਿਨਿ ਸੇਵਿਆ ਤਿਨਿ ਪਾਇਆ ਮਾਨੁ ॥<br>
ਨਾਨਕ ਗਾਵੀਐ ਗੁਣੀ ਨਿਧਾਨੁ ॥<br>
ਗਾਵੀਐ ਸੁਣੀਐ ਮਨਿ ਰਖੀਐ ਭਾਉ ॥<br>
ਦੁਖੁ ਪਰਹਰਿ ਸੁਖੁ ਘਰਿ ਲੈ ਜਾਇ ॥<br>
ਗੁਰਮੁਖਿ ਨਾਦੰ ਗੁਰਮੁਖਿ ਵੇਦੰ ਗੁਰਮੁਖਿ ਰਹਿਆ ਸਮਾਈ ॥<br>
ਗੁਰੁ ਈਸਰੁ ਗੁਰੁ ਗੋਰਖੁ ਬਰਮਾ ਗੁਰੁ ਪਾਰਬਤੀ ਮਾਈ ॥<br>
ਜੇ ਹਉ ਜਾਣਾ ਆਖਾ ਨਾਹੀ ਕਹਣਾ ਕਥਨੁ ਨ ਜਾਈ ॥<br>
ਗੁਰਾ ਇਕ ਦੇਹਿ ਬੁਝਾਈ ॥<br>
ਸਭਨਾ ਜੀਆ ਕਾ ਇਕੁ ਦਾਤਾ ਸੋ ਮੈ ਵਿਸਰਿ ਨ ਜਾਈ ॥੫॥
</p>
<h2>🪔 ਪਉੜੀ ੫ – ਵਿਆਖਿਆ</h2>
<p>
ਇਸ ਪਉੜੀ ਵਿੱਚ ਸਿੱਖਿਆ ਮਿਲਦੀ ਹੈ ਕਿ ਰੱਬ ਦਾ ਨਾਮ ਜਪਣ ਨਾਲ ਮਨ ਪਵਿੱਤਰ ਹੁੰਦਾ ਹੈ।
ਨਾਮ ਦੀ ਬਖ਼ਸ਼ਿਸ਼ ਨਾਲ ਮਨੁੱਖ ਉੱਚੀ ਆਤਮਕ ਅਵਸਥਾ ਹਾਸਲ ਕਰ ਸਕਦਾ ਹੈ।
ਸੱਚਾ ਰਸਤਾ ਨਾਮ ਸਿਮਰਨ ਅਤੇ ਗੁਰਬਾਣੀ ਅਨੁਸਾਰ ਜੀਵਨ ਜੀਣਾ ਹੈ।
</p>

<div class="conclusion">
<h2>🌺 ਨਿਸਕਰਸ਼</h2>
<p>
ਪਉੜੀ ੨ ਤੋਂ ੫ ਸਾਨੂੰ ਰੱਬ ਦੀ ਅਸੀਮ ਮਹਿਮਾ ਅਤੇ ਉਸਦੀ ਬੇਅੰਤ ਰਚਨਾ ਬਾਰੇ ਜਾਗਰੂਕ ਕਰਦੀਆਂ ਹਨ।
ਇਹ ਸਾਨੂੰ ਨਿਮਰਤਾ, ਸ਼ੁਕਰਾਨਾ ਅਤੇ ਨਾਮ ਸਿਮਰਨ ਦਾ ਮਾਰਗ ਦਿਖਾਉਂਦੀਆਂ ਹਨ।
ਜਦੋਂ ਅਸੀਂ ਰੱਬ ਦੀ ਰਜ਼ਾ ਵਿੱਚ ਰਹਿ ਕੇ ਜੀਵਨ ਜੀਵਦੇ ਹਾਂ, ਤਦੋਂ ਅਸਲੀ ਆਤਮਕ ਸੁੱਖ ਦੀ ਪ੍ਰਾਪਤੀ ਹੁੰਦੀ ਹੈ।
</p>
<p><strong>🙏 ਵਾਹਿਗੁਰੂ ਜੀ ਕਾ ਖਾਲਸਾ, ਵਾਹਿਗੁਰੂ ਜੀ ਕੀ ਫਤਹਿ।</strong></p>
